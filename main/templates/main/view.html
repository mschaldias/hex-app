{% extends 'main/base.html' %}

{% block title %}
    Week View
{% endblock %}

{% block style %}
{% load static %}
<script src="{%static 'js/item_events.js'%}"></script>
<!-- jsDelivr :: Sortable :: Latest (https://www.jsdelivr.com/package/npm/sortablejs) -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script><style>
    .list-group{
        word-break: break-all;
     }
    .chosen {
    color: #fff;
    background-color: var(--hex-text);
    }
    textarea {
    word-break: break-word;
    }
</style>
{% endblock %}

{% block content %}
{% csrf_token %}
<div>
    <h1 class="mt-4"></h1>
    <div class = "row"></div>
    <div class = "row mt-3 d-flex justify-content-center">
        <div class="col-xl-3 col-md-6">
            <div class="card bg-hex-sidenav border-0 text-white mb-3"> 
                <div class="card-header d-flex justify-content-between align-items-center">
                                <h5>Board</h5>    
                                <button  id = "create_button" class="btn btn-outline-hex-light", onclick = "create_button('todolists','board_id')"><i class="fa fa-plus"></i></button>
                </div>
                <div class="card-body">
                    <ul class="list-group mb-3" id="board_id"> 
                            {% for todolist in todolists %}
                                <li class="list-group-item list-group-item-action list-group-item-hex text-white draggable" id = "item{{todolist.id}}">
                                    <div class = "input-group mx-auto">
                                        <span class="handle btn border-0" style= "cursor:move"><i class="fa-solid fa-grip-lines-vertical fa" style="color:  var(--hex-body);"></i></span>
                                            <div class= "input-group-text bg-hex-sidenav border border-hex" ></div>                                    
                                        <textarea wrap = "hard" value = "" name = "{{todolist.id}}" class = "form-control bg-hex-topnav border border-hex text-white" onchange="edit_text('todolists',name,value)">{{todolist.name}}</textarea>
                                        <button  id = "delete_button", class="btn btn-outline-hex-dark", onclick = "delete_button('todolists','{{todolist.id}}')"><i class="fa fa-minus"></i></button>
                                    </div>
                                </li>
                            {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
    </div>
        <script>autosize_textarea();</script>        
        {% for todolist in todolists %}  
        <script>
            var list = document.getElementById('board_id');
            Sortable.create(list, {
                animation: 100,
                group: 'list-2',
                draggable: '.draggable',
                handle: '.handle',
                sort: true,
                filter: '.sortable-disabled',
                chosenClass: 'chosen',
                onUpdate: function () {
                    sortable_event('boards','board_id');
                },
            });    
        </script>
        {% endfor %}

</div>
{% endblock %}
